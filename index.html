<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRABOARD - Web App</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0f172a;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Loading Sederhana saat Iframe dimuat */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d4af37;
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loader">Memuat Aplikasi...</div>
    
    <!-- GANTI URL DI BAWAH DENGAN URL WEB APP GOOGLE KAMU -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbwI2PyAvO2JSUhg1a2ssWTvCckifRqoWlOIMHQdpV1mMyI6YBerS4XjPWZEEaAoJVUBGg/exec" 
        onload="document.getElementById('loader').style.display='none';">
    </iframe>
</body>
</html>
